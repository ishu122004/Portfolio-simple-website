<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills</title>

<style>
    body{
        background-color:pink;
        font-family:'Times New Roman', Times, serif;
    }

    h1{
        text-align:center;
    }

    .skills-container{
        display:flex;
        justify-content:space-around;
        margin-top:40px;
    }

    .column{
        display:flex;
        flex-direction:column;
        gap:30px;
    }

    .skill{
        text-align:center;
    }

    .skill img{
        width:80px;
        height:80px;
        display:block;
        margin:auto;
    }

    .skill h3{
        margin-top:10px;
    }
</style>
</head>

<body>

<a href="index.html"><h1>SKILLS</h1></a>

<div class="skills-container">
<!--column 1-->
    <div class="column">
        <div class="skill">
            <img src="python.png" alt="Python">
            <h3>Python</h3>
        </div>

        <div class="skill">
            <img src="html.png" alt="HTML">
            <h3>HTML</h3>
        </div>

        <div class="skill">
            <img src="sql.png" alt="SQL">
            <h3>SQL</h3>
        </div>
    </div>

    <!-- Column 2 -->
    <div class="column">
        <div class="skill">
            <img src="C.png" alt="C">
            <h3>C</h3>
        </div>

        <div class="skill">
            <img src="css.png" alt="CSS">
            <h3>CSS</h3>
        </div>

        <div class="skill">
            <img src="Dj.png" alt="Django">
            <h3>Django</h3>
        </div>
    </div>

    <!-- Column 3 -->
    <div class="column">
        <div class="skill">
            <img src="java.png" alt="Java">
            <h3>Java</h3>
        </div>

        <div class="skill">
            <img src="js.png" alt="JavaScript">
            <h3>JavaScript</h3>
        </div>

        <div class="skill">
            <img src="react.png" alt="React">
            <h3>React JS</h3>
        </div>
    </div>

</div>

</body>
</html>
